# Expo EAS — iOS build on EAS cloud (no macOS). Requires EXPO_TOKEN.
name: RN — iOS EAS build (cloud)

on:
  workflow_call:
    inputs:
      profile:
        description: EAS build profile (matches eas.json)
        type: string
        default: production
    secrets:
      EXPO_TOKEN:
        required: true

jobs:
  eas-ios-cloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: bash .github/scripts/install_js_deps.sh auto
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: EAS iOS (cloud)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli build --platform ios --profile "${{ inputs.profile }}" --non-interactive --no-wait
